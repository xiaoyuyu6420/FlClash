name: proxy
description: FlClash system proxy integration for Windows, macOS, and Linux.
version: 0.0.1
publish_to: none

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: '>=3.35.0'

dependencies:
  flutter:
    sdk: flutter
  path: ^1.9.0
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      windows:
        pluginClass: ProxyPluginCApi
